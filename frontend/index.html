<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>S‑Track Bus Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

/* Mobile Friendly Header */

.header{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
z-index:1000;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

.arrival{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:10px;
z-index:1000;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="header">🚍 S‑Track Live Bus Tracker</div>
<div id="map"></div>
<div class="arrival" id="arrivalTime">⏱ Calculating arrival...</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ============================
// Map Setup
// ============================

var map = L.map('map').setView([13.0827,80.2707],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


// ============================
// Bus Stops
// ============================

const stops = [
[13.0827,80.2707,"Central Stop"],
[13.0845,80.2720,"College Stop"],
[13.0870,80.2750,"Market Stop"],
[13.0900,80.2780,"Hospital Stop"]
];

stops.forEach(stop=>{
L.marker([stop[0],stop[1]])
.addTo(map)
.bindPopup("📍 "+stop[2]);
});


// ============================
// Route Line
// ============================

const route = stops.map(s=>[s[0],s[1]]);

L.polyline(route,{
color:'blue',
weight:5
}).addTo(map);


// ============================
// Bus Icon
// ============================

const busIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/61/61231.png',
iconSize:[40,40]
});

let currentPosition = [13.0827,80.2707];

let busMarker = L.marker(currentPosition,{icon:busIcon})
.addTo(map)
.bindPopup("🚍 Bus 101");


// ============================
// Smooth Animation Function
// ============================

function animateBus(newLat,newLng){

let startLat = currentPosition[0];
let startLng = currentPosition[1];

let steps = 50;
let i = 0;

let interval = setInterval(()=>{

i++;

let lat = startLat + (newLat-startLat)*(i/steps);
let lng = startLng + (newLng-startLng)*(i/steps);

busMarker.setLatLng([lat,lng]);

if(i>=steps){

clearInterval(interval);
currentPosition=[newLat,newLng];

}

},60);

}


// ============================
// Arrival Time Prediction
// ============================

function calculateArrival(lat,lng){

let lastStop = stops[stops.length-1];

let distance =
Math.sqrt(
Math.pow(lastStop[0]-lat,2) +
Math.pow(lastStop[1]-lng,2)
);

let speed = 0.002;

let time = Math.round(distance/speed);

document.getElementById("arrivalTime")
.innerHTML = "⏱ Arrival in ~ "+time+" mins";

}


// ============================
// Fetch Bus Location
// ============================

async function updateBus(){

try{

const res = await fetch("/bus-locations");
const data = await res.json();

if(data.length>0){

let bus=data[0];

animateBus(bus.latitude,bus.longitude);

calculateArrival(bus.latitude,bus.longitude);

}

}catch(err){

console.log(err);

}

}


// ============================
// Live Update
// ============================

setInterval(updateBus,4000);

</script>

</body>
</html>
