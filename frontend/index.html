<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S‑Track Bus Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

/* Header */

.header{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
z-index:1000;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

/* Arrival Time */

.arrival{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:10px;
z-index:1000;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

/* Dashboard */

#dashboard{
position:absolute;
top:70px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
z-index:1000;
}

</style>

</head>

<body>

<div class="header">🚍 S‑Track Live Bus Tracker</div>

<div id="map"></div>

<div class="arrival" id="arrivalTime">
⏱ Calculating arrival...
</div>

<div id="dashboard">
<h3>🚍 Active Buses</h3>
<ul id="busList"></ul>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ============================
// Map Setup
// ============================

var map = L.map('map').setView([13.0827,80.2707],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// ============================
// Bus Stops
// ============================

const stops = [
[13.0827,80.2707,"Central Stop"],
[13.0845,80.2720,"College Stop"],
[13.0870,80.2750,"Market Stop"],
[13.0900,80.2780,"Hospital Stop"]
];

let stopMarkers = [];

stops.forEach(stop=>{

let marker = L.marker([stop[0],stop[1]])
.addTo(map)
.bindPopup("📍 "+stop[2]);

stopMarkers.push(marker);

});

// ============================
// Route Line
// ============================

const route = stops.map(s=>[s[0],s[1]]);

L.polyline(route,{
color:"red",
weight:6
}).addTo(map);

// ============================
// Bus Icon
// ============================

const busIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/744/744465.png",
iconSize:[40,40]
});

// ============================
// Bus Markers
// ============================

let busMarkers = {};

// ============================
// Arrival Time Calculation
// ============================

function calculateArrival(busLat,busLng){

let lastStop = stops[stops.length-1];

let distance = map.distance(
[busLat,busLng],
[lastStop[0],lastStop[1]]
);

let speed = 40;

let time = Math.round((distance/1000)/speed*60);

document.getElementById("arrivalTime").innerHTML =
"⏱ Arrival in ~ "+time+" mins";

}

// ============================
// Fetch Bus Locations
// ============================

async function updateBus(){

try{

const res = await fetch("/bus-locations");
const data = await res.json();

// Update dashboard

let list = document.getElementById("busList");
list.innerHTML="";

data.forEach(bus=>{

let li=document.createElement("li");
li.innerText=bus.busId;
list.appendChild(li);

// Create marker if not exists

if(!busMarkers[bus.busId]){

busMarkers[bus.busId] = L.marker(
[bus.latitude,bus.longitude],
{icon:busIcon}
)
.addTo(map)
.bindPopup("🚍 "+bus.busId);

}else{

busMarkers[bus.busId].setLatLng(
[bus.latitude,bus.longitude]
);

}

calculateArrival(bus.latitude,bus.longitude);

});

}catch(err){

console.log(err);

}

}

// ============================
// Live Update
// ============================

setInterval(updateBus,4000);

</script>

</body>
</html>
